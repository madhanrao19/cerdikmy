# =============================================================================
# cerdikMY — nginx reverse proxy for a Cloudflare Tunnel origin.
#
# TLS is terminated at Cloudflare's edge; cloudflared connects to this nginx over
# plain HTTP. So there is NO TLS / certbot here. Mounted into the nginx container
# at /etc/nginx/conf.d/default.conf by infra/docker/docker-compose.cloudflare.yml.
#
# Routes (single public hostname):
#   /          -> Blazor web app   (web:8080)  [SignalR / WebSocket upgrade]
#   /api/      -> ASP.NET Core API  (api:8080)  [incl. public payment webhooks]
#   /api/tutor -> API, streamed (Server-Sent Events): buffering off, long timeout
#
# Cloudflare forwards the real visitor IP in `CF-Connecting-IP`, and the original
# request is always https. We pass those on as X-Forwarded-For / X-Forwarded-Proto
# so the app (with BEHIND_TLS_PROXY=true) recovers the client IP + https scheme.
#
# No rate limiting here: Cloudflare's edge plus the app's per-IP limiter (which now
# sees the real IP via forwarded headers) cover it.
# =============================================================================

# Pass WebSocket upgrades through (Blazor Server circuits run over SignalR).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Real client IP from Cloudflare, falling back to the peer if the header is absent
# (e.g. a direct hit on the origin, which should never happen via the tunnel).
map $http_cf_connecting_ip $client_ip {
    default $http_cf_connecting_ip;
    ''      $remote_addr;
}

gzip on;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_proxied any;
gzip_vary on;
gzip_types
    text/plain text/css text/javascript application/javascript
    application/json application/xml application/wasm
    image/svg+xml font/woff2;

upstream cerdik_web { server web:8080; keepalive 32; }
upstream cerdik_api { server api:8080; keepalive 32; }

server {
    listen 80;
    listen [::]:80;
    server_name _;  # Cloudflare already routes by hostname.

    client_max_body_size 50m;
    proxy_http_version 1.1;

    # Common proxy headers. NOTE: nginx does not merge proxy_set_header across
    # levels — a location that sets ANY proxy_set_header loses these — so the two
    # locations below that add headers re-declare the full set.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $client_ip;
    proxy_set_header X-Forwarded-For   $client_ip;
    proxy_set_header X-Forwarded-Proto https;

    # ---- API: streaming tutor endpoint (SSE). Must precede /api/ (longest prefix). ----
    location ^~ /api/tutor {
        proxy_pass http://cerdik_api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $client_ip;
        proxy_set_header X-Forwarded-For   $client_ip;
        proxy_set_header X-Forwarded-Proto https;

        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ---- API: everything else (auth, webhooks, app endpoints) ----
    location /api/ {
        proxy_pass http://cerdik_api;
        proxy_read_timeout 120s;
    }

    # ---- Blazor web app (root) with WebSocket upgrade for SignalR ----
    location / {
        proxy_pass http://cerdik_web;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $client_ip;
        proxy_set_header X-Forwarded-For   $client_ip;
        proxy_set_header X-Forwarded-Proto https;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 100s;
    }
}
