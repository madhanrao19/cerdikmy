# =============================================================================
# cerdikMY — nginx reverse proxy (Hostinger VPS)
#
# Routes:
#   /        -> Blazor Web App     (127.0.0.1:5080)  [SignalR/WebSocket upgrade]
#   /api/    -> ASP.NET Core API   (127.0.0.1:5081)
#   /api/tutor -> same API, but streamed (SSE): buffering off, long read timeout
#
# Install:
#   cp infra/hostinger/nginx.conf /etc/nginx/sites-available/cerdikmy.conf
#   ln -sf /etc/nginx/sites-available/cerdikmy.conf /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
# Then run certbot (see README) to enable the TLS block at the bottom.
# =============================================================================

# Map the Connection header so WebSocket upgrades pass through (Blazor Server
# circuits run over SignalR which requires Upgrade/Connection headers).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

gzip on;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_proxied any;
gzip_vary on;
gzip_types
    text/plain text/css text/javascript application/javascript
    application/json application/xml application/wasm
    image/svg+xml font/woff2;

# Upstreams (containers publish to localhost only; nginx is the public edge).
upstream cerdik_web { server 127.0.0.1:5080; keepalive 32; }
upstream cerdik_api { server 127.0.0.1:5081; keepalive 32; }

# Edge rate limiting (per client IP). Because nginx is the single public chokepoint, these limits
# are GLOBAL across all API/web replicas — a true distributed limiter without extra infrastructure.
# They complement (don't replace) the per-instance limiter inside the app.
limit_req_zone  $binary_remote_addr zone=cerdik_api:10m   rate=20r/s;   # general API
limit_req_zone  $binary_remote_addr zone=cerdik_auth:10m  rate=10r/m;   # auth (brute-force)
limit_req_status 429;

# -----------------------------------------------------------------------------
# HTTP server. Serves traffic today; becomes the HTTP->HTTPS redirect once the
# TLS block below is enabled (uncomment the redirect and comment the locations).
# -----------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name cerdik.example.my www.cerdik.example.my;

    # Let certbot answer ACME http-01 challenges without proxying them upstream.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # --- After enabling TLS, replace everything below with this redirect: ---
    # return 301 https://$host$request_uri;

    client_max_body_size 50m;
    proxy_http_version 1.1;

    # ---- API: streaming tutor endpoint (Server-Sent Events) ----
    # Must come BEFORE the generic /api/ block so it wins the longest-prefix match.
    location ^~ /api/tutor {
        proxy_pass http://cerdik_api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE: disable buffering so tokens flush to the client immediately,
        # and keep the connection open for long generations.
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ---- Auth endpoints: tighter brute-force limit ----
    location /api/auth/ {
        limit_req zone=cerdik_auth burst=5 nodelay;
        proxy_pass http://cerdik_api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ---- API: everything else ----
    location /api/ {
        limit_req zone=cerdik_api burst=40 nodelay;
        proxy_pass http://cerdik_api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ---- Blazor web app (root) with WebSocket upgrade for SignalR ----
    location / {
        proxy_pass http://cerdik_web;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 100s;
    }
}

