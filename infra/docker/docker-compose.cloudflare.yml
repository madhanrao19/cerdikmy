# =============================================================================
# cerdikMY — Cloudflare Tunnel overlay.
#
# Adds an nginx reverse proxy (the single HTTP origin on :80) and an optional
# containerized cloudflared. TLS is terminated at Cloudflare's edge — no public
# IP, no inbound firewall ports, no certbot.
#
# Bring up the stack WITH this overlay:
#   docker compose -f infra/docker/docker-compose.yml \
#                  -f infra/docker/docker-compose.cloudflare.yml \
#                  --profile tunnel up -d --build
#
#   * With  --profile tunnel : cloudflared runs in the stack and dials nginx:80.
#   * Without it             : nginx is still published on 127.0.0.1:80, so a
#                             cloudflared you run on the HOST can point at
#                             http://localhost:80.
#
# Set these in .env first (see .env.example → "Cloudflare Tunnel"):
#   TUNNEL_TOKEN, NEXT_PUBLIC_APP_URL, SESSION_COOKIE_DOMAIN
# =============================================================================
name: cerdikmy

services:
  # Single public origin: routes / -> web and /api -> api (SSE + WebSocket ready).
  nginx:
    image: nginx:1.27-alpine
    container_name: cerdik-nginx
    depends_on:
      - web
      - api
    volumes:
      - ../cloudflare/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      # Localhost only — never exposed on a public interface; reachable via the tunnel.
      - "127.0.0.1:80:80"
    networks:
      - cerdik
    restart: unless-stopped

  # Optional: run the tunnel as part of the stack (enable with `--profile tunnel`).
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cerdik-cloudflared
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate run
    environment:
      # Token from the Cloudflare Zero Trust dashboard (Networks → Tunnels). The
      # public hostname → http://nginx:80 ingress is configured there. Set it in .env
      # before running `--profile tunnel`.
      TUNNEL_TOKEN: "${TUNNEL_TOKEN:-}"
    depends_on:
      - nginx
    networks:
      - cerdik
    restart: unless-stopped

  # Tell the apps they're behind a TLS-terminating proxy and what the public URL is.
  web:
    environment:
      BEHIND_TLS_PROXY: "true"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-https://app.example.my}"
      SESSION_COOKIE_DOMAIN: "${SESSION_COOKIE_DOMAIN:-app.example.my}"

  api:
    environment:
      BEHIND_TLS_PROXY: "true"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-https://app.example.my}"
      SESSION_COOKIE_DOMAIN: "${SESSION_COOKIE_DOMAIN:-app.example.my}"
