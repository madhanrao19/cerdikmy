<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — cerdikMY</title>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; margin: 0; min-height: 100vh;
           display: flex; align-items: center; justify-content: center; background: #f6f8fc; color: #0f172a; }
    .box { text-align: center; max-width: 22rem; padding: 2rem; }
    .mark { width: 3.5rem; height: 3.5rem; border-radius: .9rem; background: #0f766e; color: #fff;
            display: inline-flex; align-items: center; justify-content: center; font-size: 1.6rem; }
    h1 { font-size: 1.3rem; margin: 1.25rem 0 .5rem; }
    p { color: #64748b; line-height: 1.5; }
    a.retry { display: inline-block; margin-top: 1.25rem; background: #0f766e; color: #fff;
              text-decoration: none; border-radius: .6rem; padding: .6rem 1.25rem; font-weight: 700; }
  </style>
</head>
<body>
  <div class="box">
    <span class="mark" aria-hidden="true">🎓</span>
    <h1>You're offline</h1>
    <p>cerdikMY needs a connection for live lessons and the AI tutor. Please reconnect and try again.</p>
    <a class="retry" href="/">Retry</a>
  </div>
</body>
</html>
